  <text x="758" y="387" fill="#065F46" font-size="17" font-family="Manrope, Arial, sans-serif" font-weight="700">Expertise Service</text>
  <text x="758" y="411" fill="#065F46" font-size="14" font-family="Plus Jakarta Sans, Arial, sans-serif">Port 8004</text>

