  <text x="964" y="387" fill="#065F46" font-size="17" font-family="Manrope, Arial, sans-serif" font-weight="700">Brainstorm Service</text>
  <text x="964" y="411" fill="#065F46" font-size="14" font-family="Plus Jakarta Sans, Arial, sans-serif">Port 8005</text>

  <rect x="814" y="462" width="236" height="68" rx="12" fill="#D1FAE5" stroke="#34D399"/>
  <text x="846" y="490" fill="#065F46" font-size="16" font-family="Manrope, Arial, sans-serif" font-weight="700">Decision Support Outputs</text>
  <text x="846" y="512" fill="#065F46" font-size="13" font-family="Plus Jakarta Sans, Arial, sans-serif">alerts " recommendations " sprint guidance</text>

